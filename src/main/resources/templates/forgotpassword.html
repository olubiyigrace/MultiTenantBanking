<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f7;
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888888;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Hello, <span th:text="${name}">User</span>!</h2>
    <p>You requested for a password change. Please use the link below for the change:<span th:text="${email}">User</span></p>

    <a th:href="${resetUrl}"
       style="background:#2563eb; color:#ffffff; padding:12px 18px; text-decoration:none; border-radius:6px; font-weight:bold; display:inline-block;">
        Reset Password
    </a>

    <p>If the button doesn’t work, please copy and paste the following link into your browser:</p>
        <p><a th:href="${resetUrl}" th:text="${resetUrl}">verification link</a></p>

    <div class="footer">
        <p>If you did not create an account, please ignore this email.</p>
        <p>— The Team</p>
    </div>
</div>
</body>
</html>
