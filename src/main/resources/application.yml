spring:
  application:
    name: MultiTenantBanking

  config:
    import: optional:file:.env

  mail:
    host: smtp.gmail.com
    port: 587
    username: multitenantbank@gmail.com
    password: "dhmj rivz ftmg osoo"

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true
            required: true

          ssl:
            enable: false

  datasource:
    url: jdbc:postgresql://localhost:5433/multitenant_db
    username: "postgres"
    password: "Oluwafunke3060$"
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 12000000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

        jdbc:
          batch_size: 20

        order_updates: true
        order_inserts: true

        multi_tenancy: SCHEMA

    show-sql: true
    open-in-view: false

  flyway:
    enabled: false
    baseline-on-migrate: true

    locations:
      - classpath:db/migration/common

    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

server:
  port: 3070

app:
  jwt:
    private-key-path: certs/private_key.pem
    public-key-path: certs/public_key.pem

    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

springdoc:
  default-produces-media-type: application/json

  swagger-ui:
    enabled: true
    operations-sorter: method
    tags-sorter: alpha